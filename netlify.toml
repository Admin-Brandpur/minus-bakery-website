# Netlify configuration for Minu's Bakery website
#
# WHAT THIS FILE DOES:
# - Tells Netlify to run "node build.js" before every deploy.
#   This regenerates index.html from content.json so SEO tags
#   stay in sync with whatever was edited in the CMS (/admin).
# - "publish = .": the whole project folder is published as-is
#   (index.html, content.json, images, admin panel, etc.)

[build]
  command = "node build.js"
  publish = "."

# Security headers (also present in _headers, kept here for redundancy)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    X-XSS-Protection = "1; mode=block"

# Ensure /admin/ correctly serves the Decap CMS panel at admin/index.html
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 200
